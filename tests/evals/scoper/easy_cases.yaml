# Explicit symbols / paths — expect core file inclusion after scoping.
# Each case includes synthetic discovery rows (`candidates`) plus expected signals.
- id: easy_scoper_class
  instruction: "Narrow to the implementation of ExplorationScoper.scope and its JSON selection logic."
  candidates:
    - file_path: agent_v2/exploration/exploration_scoper.py
      snippet: "class ExplorationScoper: def scope(self, instruction, candidates)"
      symbol: ExplorationScoper
      source: graph
    - file_path: agent/models/model_client.py
      snippet: "def call_reasoning_model(prompt: str)"
      symbol: call_reasoning_model
      source: grep
    - file_path: agent_v2/config.py
      snippet: "DEFAULT_TIMEOUT = 30"
      symbol: null
      source: vector
  expected:
    must_include:
      - exploration_scoper.py
      - ExplorationScoper
    should_include:
      - scope

