# Edge pools — additive flags: allow_empty_candidates, allow_empty_output (safe empty path).
- id: scoper_edge_empty_pool
  edge_category: empty_input
  edge_handling: system_handled
  trace_id: trace_empty_input_system
  instruction: "Narrow to exploration scoper implementation."
  allow_empty_candidates: true
  candidates: []
  expected:
    must_include: []
    should_include: []

- id: scoper_edge_whitespace_instruction
  edge_category: empty_input
  edge_handling: model_handled
  trace_id: trace_empty_input_model_scoper
  instruction: "   "
  candidates:
    - file_path: agent_v2/exploration/exploration_scoper.py
      snippet: "class ExplorationScoper"
      symbol: ExplorationScoper
      source: graph
  expected:
    must_include:
      - exploration_scoper.py

