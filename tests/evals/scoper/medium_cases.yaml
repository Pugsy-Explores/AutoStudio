# Conceptual queries — expect relevant modules, not only exact symbols.
- id: medium_scope_layer
  instruction: "How does the exploration scope layer reduce breadth before batch selection?"
  candidates:
    - file_path: agent_v2/exploration/exploration_scoper.py
      snippet: "Phase 12.6.F — LLM breadth reduction before CandidateSelector.select_batch"
      symbol: ExplorationScoper
      source: graph
    - file_path: agent_v2/exploration/candidate_selector.py
      snippet: "CandidateSelector select_batch ranked candidates"
      symbol: CandidateSelector
      source: grep
    - file_path: agent_v2/exploration/exploration_engine_v2.py
      snippet: "ExplorationEngineV2 enqueue discovery"
      symbol: null
      source: grep
    - file_path: repo_index/index_repo.py
      snippet: "def main(): CLI entry for repo indexing"
      symbol: null
      source: vector
  expected:
    must_include:
      - exploration_scoper.py
    should_include:
      - candidate_selector.py

