      content: |
        class JSONExtractor:
            @staticmethod
            def extract_final_json(text: str, validate_fn=None) -> dict:
                candidates = JSONExtractor.extract_all_json_candidates(text)
                if validate_fn is None:
                    if candidates:
                        return candidates[-1]
                raise ValueError("No valid JSON object found")
