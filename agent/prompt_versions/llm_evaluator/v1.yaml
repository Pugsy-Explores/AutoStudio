version: v1
role: system
instructions: |
  You are evaluating whether a step execution satisfied the user intent.

  Instruction:
  {instruction}

  Plan:
  {plan}

  Step Results:
  {step_results}

  Return JSON only:
  {{
    "is_success": true/false,
    "confidence": 0.0 to 1.0,
    "reason": "short explanation"
  }}
constraints: []
output_schema:
  type: object
  required: [is_success, confidence, reason]
  properties:
    is_success:
      type: boolean
    confidence:
      type: number
    reason:
      type: string
